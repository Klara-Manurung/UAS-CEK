<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semangat UAS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a73e8;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #34a853;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2d8e47;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kerjakan UAS Yukk!</h1>
        <p>Fokus, teliti, dan jangan lupa berdoa.</p>
        <button onclick="alert('Selamat berjuang, kamu pasti bisa!')">
            Mulai Belajar
        </button>
    </div>

</body>
</html>
